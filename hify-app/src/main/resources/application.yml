server:
  port: 8080

spring:
  application:
    name: hify
  datasource:
    # 主数据源：MySQL（MyBatis-Plus 自动使用）
    url: jdbc:mysql://localhost:3306/hify?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: your_redis_password
  cache:
    type: simple
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 第二数据源：PostgreSQL / pgvector（手动配置，不影响主数据源自动配置）
pgvector:
  datasource:
    url: jdbc:postgresql://localhost:5432/hify
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

# RAG 知识库配置
hify:
  rag:
    upload-dir: ./uploads
    embedding:
      provider-id: 1              # 关联 t_provider.id，复用 Provider 模块配置
      model: text-embedding-v4    # 阿里云百炼 DashScope

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

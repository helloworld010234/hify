# ============================================
# Hify Docker Compose
# 包含前端（Nginx）和后端（Spring Boot）两个服务
# MySQL、Redis、PostgreSQL 为外部服务，通过环境变量配置
# ============================================

version: "3.8"

services:
  # ---------------- 后端服务 ----------------
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: hify-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${BACKEND_MANAGE_PORT:-8081}:8081"
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # Redis 配置
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      # pgvector 配置
      PGVECTOR_DATASOURCE_URL: jdbc:postgresql://${PGVECTOR_HOST}:${PGVECTOR_PORT:-5432}/${PGVECTOR_DATABASE}
      PGVECTOR_DATASOURCE_USERNAME: ${PGVECTOR_USER}
      PGVECTOR_DATASOURCE_PASSWORD: ${PGVECTOR_PASSWORD}
      # JVM 参数
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    volumes:
      # 上传文件持久化
      - ${UPLOAD_DIR:-./uploads}:/app/uploads
      # 可选：外部配置文件覆盖
      - ${CONFIG_PATH:-./config}:/app/config:ro
    networks:
      - hify-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ---------------- 前端服务 ----------------
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: hify-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hify-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  hify-network:
    driver: bridge
